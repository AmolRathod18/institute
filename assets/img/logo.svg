<svg width="150" height="50" viewBox="0 0 150 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004C99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="150" height="50" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Logo Mark - Modern Code Bracket with animation ready -->
  <g id="logo-mark">
    <!-- Left bracket with gradient -->
    <path d="M 10 12 L 14 16 L 10 20 L 12 22 L 20 16 L 12 10 Z" fill="url(#logoGradient)" stroke="url(#logoGradient)" stroke-width="1.5" stroke-linejoin="round"/>
    
    <!-- Center accent dot -->
    <circle cx="16" cy="16" r="2.5" fill="#FF6B35"/>
    <circle cx="16" cy="16" r="3.5" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.4"/>
    
    <!-- Right bracket -->
    <path d="M 22 12 L 20 10 L 28 16 L 20 22 L 22 24 L 30 20 L 22 12 Z" fill="url(#logoGradient)" stroke="url(#logoGradient)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  
  <!-- Text Logo -->
  <text x="38" y="32" font-family="'Poppins', sans-serif" font-size="20" font-weight="700" fill="#0066CC" letter-spacing="0.3">
    Frontend
  </text>
  
  <!-- Brand accent word -->
  <text x="38" y="47" font-family="'Poppins', sans-serif" font-size="10" font-weight="600" fill="#FF6B35" letter-spacing="1">
    .CLUB
  </text>
  
  <!-- Decorative line -->
  <line x1="38" y1="35" x2="145" y2="35" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
</svg>